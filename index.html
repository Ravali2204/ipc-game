<!DOCTYPE html>
<html>
<head>
  <title>IPC Cryptogram Game</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0f172a;
      color: white;
    }

    .box {
      margin-top: 30px;
    }

    input {
      padding: 10px;
      font-size: 16px;
      width: 220px;
      margin: 5px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      background: #22c55e;
      border: none;
      color: white;
      cursor: pointer;
      margin: 5px;
    }

    .code {
      font-size: 24px;
      margin: 20px;
      color: #38bdf8;
    }

    .timer {
      font-size: 20px;
      color: #facc15;
    }

    table {
      margin: auto;
      margin-top: 20px;
      border-collapse: collapse;
      width: 50%;
    }

    th, td {
      border: 1px solid white;
      padding: 10px;
    }

    th {
      background: #22c55e;
    }
  </style>
</head>

<body>

<h1>🔐 IPC Cryptogram Game</h1>

<div class="box">
  <input type="text" id="playerName" placeholder="Enter your name">
</div>

<div class="box">
  <div class="timer">⏱ Time Left: <span id="time">60</span>s</div>
  <div class="code" id="code"></div>
  <input type="text" id="answer" placeholder="Enter Answer">
  <br><br>
  <button onclick="checkAnswer()">Submit</button>
  <p id="result"></p>
  <p id="score"></p>
</div>

<div class="box">
  <h2>🏆 Leaderboard</h2>
  <table id="leaderboard">
    <tr>
      <th>Name</th>
      <th>Score</th>
    </tr>
  </table>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

// 🔥 REPLACE WITH YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ✅ 7 QUESTIONS
const questions = [
  {code: "13 5 19 19 1 7 5 17 21 5 21 5", answer: "MESSAGE QUEUE"},
  {code: "19 8 1 18 5 4 13 5 13 15 18 25", answer: "SHARED MEMORY"},
  {code: "16 18 15 3 5 19 19", answer: "PROCESS"},
  {code: "3 15 13 13 21 14 9 3 1 20 9 15 14", answer: "COMMUNICATION"},
  {code: "19 25 14 3 8 18 15 14 9 26 1 20 9 15 14", answer: "SYNCHRONIZATION"},
  {code: "9 14 20 5 18 16 18 15 3 5 19 19", answer: "INTERPROCESS"},
  {code: "4 1 20 1 19 8 1 18 9 14 7", answer: "DATA SHARING"}
];

let current = 0;
let score = 0;
let timeLeft = 60;
let timer;

// Timer
function startTimer() {
  timeLeft = 60;
  document.getElementById("time").innerText = timeLeft;

  timer = setInterval(() => {
    timeLeft--;
    document.getElementById("time").innerText = timeLeft;

    if (timeLeft <= 0) {
      clearInterval(timer);
      nextQuestion();
    }
  }, 1000);
}

// Load Question
function loadQuestion() {
  document.getElementById("code").innerText = questions[current].code;
  document.getElementById("answer").value = "";
  document.getElementById("result").innerText = "";
  startTimer();
}

// Check Answer
function checkAnswer() {
  clearInterval(timer);

  let user = document.getElementById("answer").value.toUpperCase();

  if(user === questions[current].answer) {
    document.getElementById("result").innerText = "✅ Correct!";
    score++;
  } else {
    document.getElementById("result").innerText =
      "❌ Wrong! Answer: " + questions[current].answer;
  }

  setTimeout(nextQuestion, 1000);
}

// Next Question
function nextQuestion() {
  current++;

  if(current < questions.length) {
    loadQuestion();
  } else {
    document.getElementById("code").innerText = "🎉 Game Completed!";
    document.getElementById("score").innerText = "Your Score: " + score;
    saveScore();
  }
}

// Save Score (Firebase)
function saveScore() {
  let name = document.getElementById("playerName").value;

  if(name === "") {
    alert("Enter your name!");
    return;
  }

  db.collection("scores").add({
    name: name,
    score: score
  });
}

// Live Leaderboard
function displayLeaderboard() {
  db.collection("scores")
    .orderBy("score", "desc")
    .onSnapshot((snapshot) => {

      let table = document.getElementById("leaderboard");

      table.innerHTML = `
        <tr>
          <th>Name</th>
          <th>Score</th>
        </tr>
      `;

      snapshot.forEach(doc => {
        let data = doc.data();
        let row = table.insertRow();
        row.insertCell(0).innerText = data.name;
        row.insertCell(1).innerText = data.score;
      });
    });
}

loadQuestion();
displayLeaderboard();

</script>

</body>
</html>
