<!DOCTYPE html>
<html>
<head>
  <title>IPC Cryptogram Pro</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
    }

    h1 {
      margin-top: 20px;
    }

    .top {
      display: flex;
      justify-content: space-around;
      margin-top: 15px;
    }

    .box {
      margin-top: 30px;
    }

    .code {
      font-size: 28px;
      color: #38bdf8;
      margin: 20px;
    }

    input {
      padding: 12px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
      text-align: center;
    }

    button {
      padding: 10px 20px;
      border: none;
      background: #22c55e;
      color: white;
      border-radius: 10px;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    #leaderboard {
      margin-top: 30px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<h1>🔐 IPC Cryptogram Pro Game</h1>

<div id="startScreen">
  <h2>Enter Your Name</h2>
  <input type="text" id="playerName" placeholder="Your Name">
  <br><br>
  <button onclick="startGame()">Start Game</button>
</div>

<div id="gameScreen" class="hidden">

  <div class="top">
    <div>🏆 Score: <span id="score">0</span></div>
    <div>⏱️ Time: <span id="time">15</span></div>
  </div>

  <div class="box">
    <div class="code" id="code"></div>

    <input type="text" id="answer" placeholder="Enter Answer">
    <br><br>

    <button onclick="checkAnswer()">Submit</button>

    <p id="result"></p>
  </div>

</div>

<div id="endScreen" class="hidden">
  <h2>🎉 Game Over!</h2>
  <p id="finalScore"></p>
  <button onclick="location.reload()">Play Again</button>

  <div id="leaderboard">
    <h3>🏆 Leaderboard</h3>
    <ul id="scoresList"></ul>
  </div>
</div>

<script>

let player = "";
let score = 0;
let current = 0;
let time = 15;
let timer;

const questions = [
  {code: "13 5 19 19 1 7 5 17 21 5 21 5", answer: "MESSAGE QUEUE"},
  {code: "19 8 1 18 5 4 13 5 13 15 18 25", answer: "SHARED MEMORY"},
  {code: "16 18 15 3 5 19 19", answer: "PROCESS"},
  {code: "3 15 13 13 21 14 9 3 1 20 9 15 14", answer: "COMMUNICATION"},
  {code: "19 25 14 3 8 18 15 14 9 26 1 20 9 15 14", answer: "SYNCHRONIZATION"}
];

// Start Game
function startGame() {
  player = document.getElementById("playerName").value;

  if (player === "") {
    alert("Enter your name!");
    return;
  }

  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("gameScreen").classList.remove("hidden");

  loadQuestion();
}

// Load Question
function loadQuestion() {
  document.getElementById("code").innerText = questions[current].code;
  document.getElementById("answer").value = "";
  document.getElementById("result").innerText = "";

  time = 60;
  document.getElementById("time").innerText = time;

  clearInterval(timer);
  startTimer();
}

// Timer
function startTimer() {
  timer = setInterval(() => {
    time--;
    document.getElementById("time").innerText = time;

    if (time === 0) {
      clearInterval(timer);
      nextQuestion();
    }
  }, 1000);
}

// Check Answer
function checkAnswer() {
  let user = document.getElementById("answer").value.toUpperCase();

  if (user === questions[current].answer) {
    score += 10;
    document.getElementById("score").innerText = score;

    document.getElementById("result").innerText = "✅ Correct!";
    clearInterval(timer);

    setTimeout(nextQuestion, 1000);
  } else {
    document.getElementById("result").innerText = "❌ Try Again!";
  }
}

// Next Question
function nextQuestion() {
  current++;

  if (current < questions.length) {
    loadQuestion();
  } else {
    endGame();
  }
}

// End Game
function endGame() {
  document.getElementById("gameScreen").classList.add("hidden");
  document.getElementById("endScreen").classList.remove("hidden");

  document.getElementById("finalScore").innerText =
    player + ", Your Score: " + score;

  saveScore(player, score);
  showLeaderboard();
}

// Save Score
function saveScore(name, score) {
  let scores = JSON.parse(localStorage.getItem("ipcScores")) || [];

  scores.push({name, score});
  scores.sort((a, b) => b.score - a.score);

  localStorage.setItem("ipcScores", JSON.stringify(scores));
}

// Show Leaderboard
function showLeaderboard() {
  let scores = JSON.parse(localStorage.getItem("ipcScores")) || [];
  let list = document.getElementById("scoresList");

  list.innerHTML = "";

  scores.slice(0, 5).forEach(s => {
    let li = document.createElement("li");
    li.innerText = s.name + " - " + s.score;
    list.appendChild(li);
  });
}

</script>

</body>
</html>
